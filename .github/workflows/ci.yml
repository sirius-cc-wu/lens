name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Check browser asset
        run: node scripts/asset-check.mjs

      - name: Run tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Build release binary
        run: cargo build --locked --release

      - name: Verify package contents
        run: cargo package --locked --no-verify

  browser-smoke:
    name: Browser smoke test
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --locked --release

      - name: Start Lens
        run: |
          target/release/lens --no-open --port 39126 tests/fixtures/browser-repo > lens-browser.log 2>&1 &
          echo $! > lens-browser.pid
          for attempt in $(seq 1 30); do
            if curl --fail --silent --output /dev/null http://127.0.0.1:39126/; then exit 0; fi
            sleep 1
          done
          cat lens-browser.log
          exit 1

      - name: Run Chrome smoke test
        run: node scripts/browser-smoke.mjs http://127.0.0.1:39126/

      - name: Run browser interaction test
        run: node scripts/browser-interaction.mjs http://127.0.0.1:39126/

      - name: Stop Lens
        if: always()
        run: kill "$(cat lens-browser.pid)" || true

  release:
    name: Release archive (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release archive
        shell: bash
        run: bash scripts/package-release.sh "${{ matrix.target }}" dist

      - name: Run archive installation smoke test
        shell: bash
        run: |
          for archive in dist/*.tar.gz; do bash scripts/install-smoke.sh "$archive"; done

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: lens-${{ matrix.target }}
          path: dist/*

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Verify tag matches package version
        shell: bash
        run: |
          manifest_version="$(awk '
            $0 == "[package]" { in_package = 1; next }
            in_package && /^\[/ { exit }
            in_package && /^version[[:space:]]*=/ {
              match($0, /"[^"]+"/)
              print substr($0, RSTART + 1, RLENGTH - 2)
              exit
            }
          ' Cargo.toml)"
          expected_tag="v${manifest_version}"
          test "${GITHUB_REF_NAME}" = "${expected_tag}"

  package:
    needs: verify-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Rust 1.75 and target
        uses: dtolnay/rust-toolchain@1.75
        with:
          targets: ${{ matrix.target }}
      - name: Package native archive
        shell: bash
        run: scripts/package-release.sh --target "${{ matrix.target }}" --output dist
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}" release-assets/*
          --repo "${GITHUB_REPOSITORY}" --verify-tag --generate-notes
